              - generic [ref=e99]:
                - heading "打造个人开发知识管理系统：定时备份与飞书通知实战" [level=1] [ref=e100]
                - blockquote [ref=e101]:
                  - paragraph [ref=e102]: 本文记录了如何构建一个完整的开发配置与知识管理自动化系统，包括每日自动备份、飞书实时通知、以及技术沉淀的自动发布流程。
                - heading "背景" [level=2] [ref=e103]
                - paragraph [ref=e104]: 作为一名开发者，我们日常使用 OpenCode 进行 AI 辅助编程，积累了大量的配置信息（AGENTS.md）和项目经验（memory.md）。这些内容如果丢失，将是巨大的损失。
                - paragraph [ref=e105]: 因此，我构建了一套自动化系统来实现：
                - list [ref=e106]:
                  - listitem [ref=e107]: 每日自动备份全局配置和项目文件到 GitHub
                  - listitem [ref=e108]: 任务执行状态实时推送到飞书群
                  - listitem [ref=e109]: 将项目中的经验总结自动发布到技术博客
                - heading "系统架构" [level=2] [ref=e110]
                - code [ref=e112]: ┌─────────────────────────────────────────────────────────────┐ │ 每日 18:00 定时触发 │ └─────────────────────────────────────────────────────────────┘ │ ▼ ┌─────────────────────────────────────────────────────────────┐ │ Windows Task Scheduler │ │ ┌─────────────────┐ ┌──────────────────┐ ┌─────────────┐ │ │ │ backup-global │ │ backup-projects │ │ publish- │ │ │ │ .ps1 │ │ .ps1 │ │ summary.ps1 │ │ │ └─────────────────┘ └──────────────────┘ └─────────────┘ │ └─────────────────────────────────────────────────────────────┘ │ ┌───────────────────┼───────────────────┐ ▼ ▼ ▼ ┌──────────────────┐ ┌──────────────┐ ┌─────────────────┐ │ GitHub 仓库 │ │ 飞书机器人 │ │ Blog 草稿 │ │ opencode-backup │ │ Detroit │ │ daily-summary │ └──────────────────┘ └──────────────┘ └─────────────────┘
                - heading "核心实现" [level=2] [ref=e113]
                - heading "1. PowerShell 备份脚本" [level=3] [ref=e114]
                - paragraph [ref=e115]: 以全局配置备份为例，核心代码如下：
                - code [ref=e117]: "# 飞书通知函数 function Send-FeishuMessage { param(\\$text) $env:LARK_CLI_NO_PROXY = \"1\" npx -y @larksuite/cli im +messages-send --chat-id $CHAT_ID --text $text } # 开始时发送通知 Send-FeishuMessage -text \"📦 开始执行全局配置备份任务...\" # 执行备份逻辑 # ... git clone, copy files, commit, push ... # 完成时发送通知 $successMsg = \"✅ 全局配置备份完成！\" Send-FeishuMessage -text $successMsg"
                - heading "2. Windows 定时任务" [level=3] [ref=e118]
                - paragraph [ref=e119]:
                  - text: 使用
                  - code [ref=e120]: schtasks
                  - text: 创建每日定时任务：
                - code [ref=e122]: "# 创建全局备份任务 schtasks /Create /F /TN \"OpenCode\\\\opencode-daily-backup-global\" \\\\ /TR \"powershell.exe -ExecutionPolicy Bypass -File D:\\\\Work\\\\ForAI\\\\scripts\\\\backup-global.ps1\" \\\\ /SC DAILY /ST 18:00"
                - heading "3. 飞书消息效果" [level=3] [ref=e123]
                - paragraph [ref=e124]: 任务执行时会在"Detroit家人群"收到如下消息：
                - code [ref=e126]: "📦 开始执行全局配置备份任务... 时间: 2026-04-05 18:00 ✅ 全局AGENTS.md 已备份 ✅ 全局memory.md 已备份 ✅ 提交成功 ✅ 已推送到 GitHub 完成时间: 2026-04-05 18:00:30"
                - heading "关键经验总结" [level=2] [ref=e127]
                - heading "1. 代理环境处理" [level=3] [ref=e128]
                - paragraph [ref=e129]: 飞书 CLI 在有代理的环境下可能出现问题，解决方法：
                - code [ref=e131]: "$env:LARK_CLI_NO_PROXY = \"1\" # 禁用代理"
                - heading "2. opencode-scheduler 的局限性" [level=3] [ref=e132]
                - list [ref=e133]:
                  - listitem [ref=e134]:
                    - text: 在 Windows 上使用
                    - code [ref=e135]: schedule_job
                    - text: 工具创建的任务会失败
                  - listitem [ref=e136]:
                    - text: 解决方案：直接使用
                    - code [ref=e137]: schtasks
                    - text: 创建 Windows 原生任务
                - heading "3. 备份仓库策略" [level=3] [ref=e138]
                - list [ref=e139]:
                  - listitem [ref=e140]: 创建私有仓库避免敏感信息泄露
                  - listitem [ref=e141]:
                    - text: 使用
                    - code [ref=e142]: gh auth
                    - text: 登录后直接推送，无需每次输入凭据
                - heading "技术栈" [level=2] [ref=e143]
