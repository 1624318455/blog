            - generic [ref=e88]:
              - heading "打造个人开发知识管理系统：定时备份与飞书通知实战" [level=1] [ref=e89]
              - blockquote [ref=e90]:
                - paragraph [ref=e91]: 本文记录了如何构建一个完整的开发配置与知识管理自动化系统，包括每日自动备份、飞书实时通知、以及技术沉淀的自动发布流程。
              - heading "背景" [level=2] [ref=e92]
              - paragraph [ref=e93]: 作为一名开发者，我们日常使用 OpenCode 进行 AI 辅助编程，积累了大量的配置信息（AGENTS.md）和项目经验（memory.md）。这些内容如果丢失，将是巨大的损失。
              - paragraph [ref=e94]: 因此，我构建了一套自动化系统来实现：
              - list [ref=e95]:
                - listitem [ref=e96]: 每日自动备份全局配置和项目文件到 GitHub
                - listitem [ref=e97]: 任务执行状态实时推送到飞书群
                - listitem [ref=e98]: 将项目中的经验总结自动发布到技术博客
              - heading "系统架构" [level=2] [ref=e99]
              - code [ref=e101]: ┌─────────────────────────────────────────────────────────────┐ │ 每日 18:00 定时触发 │ └─────────────────────────────────────────────────────────────┘ │ ▼ ┌─────────────────────────────────────────────────────────────┐ │ Windows Task Scheduler │ │ ┌─────────────────┐ ┌──────────────────┐ ┌─────────────┐ │ │ │ backup-global │ │ backup-projects │ │ publish- │ │ │ │ .ps1 │ │ .ps1 │ │ summary.ps1 │ │ │ └─────────────────┘ └──────────────────┘ └─────────────┘ │ └─────────────────────────────────────────────────────────────┘ │ ┌───────────────────┼───────────────────┐ ▼ ▼ ▼ ┌──────────────────┐ ┌──────────────┐ ┌─────────────────┐ │ GitHub 仓库 │ │ 飞书机器人 │ │ Blog 草稿 │ │ opencode-backup │ │ Detroit │ │ daily-summary │ └──────────────────┘ └──────────────┘ └─────────────────┘
              - heading "核心实现" [level=2] [ref=e102]
              - heading "1. PowerShell 备份脚本" [level=3] [ref=e103]
              - paragraph [ref=e104]: 以全局配置备份为例，核心代码如下：
              - code [ref=e106]: "# 飞书通知函数 function Send-FeishuMessage { param(\\$text) $env:LARK_CLI_NO_PROXY = \"1\" npx -y @larksuite/cli im +messages-send --chat-id $CHAT_ID --text $text } # 开始时发送通知 Send-FeishuMessage -text \"📦 开始执行全局配置备份任务...\" # 执行备份逻辑 # ... git clone, copy files, commit, push ... # 完成时发送通知 $successMsg = \"✅ 全局配置备份完成！\" Send-FeishuMessage -text $successMsg"
              - heading "2. Windows 定时任务" [level=3] [ref=e107]
              - paragraph [ref=e108]:
                - text: 使用
                - code [ref=e109]: schtasks
                - text: 创建每日定时任务：
              - code [ref=e111]: "# 创建全局备份任务 schtasks /Create /F /TN \"OpenCode\\\\opencode-daily-backup-global\" \\\\ /TR \"powershell.exe -ExecutionPolicy Bypass -File D:\\\\Work\\\\ForAI\\\\scripts\\\\backup-global.ps1\" \\\\ /SC DAILY /ST 18:00"
              - heading "3. 飞书消息效果" [level=3] [ref=e112]
              - paragraph [ref=e113]: 任务执行时会在"Detroit家人群"收到如下消息：
              - code [ref=e115]: "📦 开始执行全局配置备份任务... 时间: 2026-04-05 18:00 ✅ 全局AGENTS.md 已备份 ✅ 全局memory.md 已备份 ✅ 提交成功 ✅ 已推送到 GitHub 完成时间: 2026-04-05 18:00:30"
              - heading "关键经验总结" [level=2] [ref=e116]
              - heading "1. 代理环境处理" [level=3] [ref=e117]
              - paragraph [ref=e118]: 飞书 CLI 在有代理的环境下可能出现问题，解决方法：
              - code [ref=e120]: "$env:LARK_CLI_NO_PROXY = \"1\" # 禁用代理"
              - heading "2. opencode-scheduler 的局限性" [level=3] [ref=e121]
              - list [ref=e122]:
                - listitem [ref=e123]:
                  - text: 在 Windows 上使用
                  - code [ref=e124]: schedule_job
                  - text: 工具创建的任务会失败
                - listitem [ref=e125]:
                  - text: 解决方案：直接使用
                  - code [ref=e126]: schtasks
                  - text: 创建 Windows 原生任务
              - heading "3. 备份仓库策略" [level=3] [ref=e127]
              - list [ref=e128]:
                - listitem [ref=e129]: 创建私有仓库避免敏感信息泄露
                - listitem [ref=e130]:
                  - text: 使用
                  - code [ref=e131]: gh auth
                  - text: 登录后直接推送，无需每次输入凭据
              - heading "技术栈" [level=2] [ref=e132]
              - table [ref=e133]:
                - rowgroup [ref=e134]:
                  - row "组件 用途" [ref=e135]:
