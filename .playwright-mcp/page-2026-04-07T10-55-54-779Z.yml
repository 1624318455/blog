          - generic [ref=e297]:
            - heading "打造个人开发知识管理系统：定时备份与飞书通知实战" [level=1] [ref=e298]
            - blockquote [ref=e299]:
              - paragraph [ref=e300]: 本文记录了如何构建一个完整的开发配置与知识管理自动化系统，包括每日自动备份、飞书实时通知、以及技术沉淀的自动发布流程。
            - heading "背景" [level=2] [ref=e301]
            - paragraph [ref=e302]: 作为一名开发者，我们日常使用 OpenCode 进行 AI 辅助编程，积累了大量的配置信息（AGENTS.md）和项目经验（memory.md）。这些内容如果丢失，将是巨大的损失。
            - paragraph [ref=e303]: 因此，我构建了一套自动化系统来实现：
            - list [ref=e304]:
              - listitem [ref=e305]: 每日自动备份全局配置和项目文件到 GitHub
              - listitem [ref=e306]: 任务执行状态实时推送到飞书群
              - listitem [ref=e307]: 将项目中的经验总结自动发布到技术博客
            - heading "系统架构" [level=2] [ref=e308]
            - code [ref=e310]: ┌─────────────────────────────────────────────────────────────┐ │ 每日 18:00 定时触发 │ └─────────────────────────────────────────────────────────────┘ │ ▼ ┌─────────────────────────────────────────────────────────────┐ │ Windows Task Scheduler │ │ ┌─────────────────┐ ┌──────────────────┐ ┌─────────────┐ │ │ │ backup-global │ │ backup-projects │ │ publish- │ │ │ │ .ps1 │ │ .ps1 │ │ summary.ps1 │ │ │ └─────────────────┘ └──────────────────┘ └─────────────┘ │ └─────────────────────────────────────────────────────────────┘ │ ┌───────────────────┼───────────────────┐ ▼ ▼ ▼ ┌──────────────────┐ ┌──────────────┐ ┌─────────────────┐ │ GitHub 仓库 │ │ 飞书机器人 │ │ Blog 草稿 │ │ opencode-backup │ │ Detroit │ │ daily-summary │ └──────────────────┘ └──────────────┘ └─────────────────┘
            - heading "核心实现" [level=2] [ref=e311]
            - heading "1. PowerShell 备份脚本" [level=3] [ref=e312]
            - paragraph [ref=e313]: 以全局配置备份为例，核心代码如下：
            - code [ref=e315]: "# 飞书通知函数 function Send-FeishuMessage { param(\\$text) $env:LARK_CLI_NO_PROXY = \"1\" npx -y @larksuite/cli im +messages-send --chat-id $CHAT_ID --text $text } # 开始时发送通知 Send-FeishuMessage -text \"📦 开始执行全局配置备份任务...\" # 执行备份逻辑 # ... git clone, copy files, commit, push ... # 完成时发送通知 $successMsg = \"✅ 全局配置备份完成！\" Send-FeishuMessage -text $successMsg"
            - heading "2. Windows 定时任务" [level=3] [ref=e316]
            - paragraph [ref=e317]:
              - text: 使用
              - code [ref=e318]: schtasks
              - text: 创建每日定时任务：
            - code [ref=e320]: "# 创建全局备份任务 schtasks /Create /F /TN \"OpenCode\\\\opencode-daily-backup-global\" \\\\ /TR \"powershell.exe -ExecutionPolicy Bypass -File D:\\\\Work\\\\ForAI\\\\scripts\\\\backup-global.ps1\" \\\\ /SC DAILY /ST 18:00"
            - heading "3. 飞书消息效果" [level=3] [ref=e321]
            - paragraph [ref=e322]: 任务执行时会在"Detroit家人群"收到如下消息：
            - code [ref=e324]: "📦 开始执行全局配置备份任务... 时间: 2026-04-05 18:00 ✅ 全局AGENTS.md 已备份 ✅ 全局memory.md 已备份 ✅ 提交成功 ✅ 已推送到 GitHub 完成时间: 2026-04-05 18:00:30"
            - heading "关键经验总结" [level=2] [ref=e325]
            - heading "1. 代理环境处理" [level=3] [ref=e326]
            - paragraph [ref=e327]: 飞书 CLI 在有代理的环境下可能出现问题，解决方法：
            - code [ref=e329]: "$env:LARK_CLI_NO_PROXY = \"1\" # 禁用代理"
            - heading "2. opencode-scheduler 的局限性" [level=3] [ref=e330]
            - list [ref=e331]:
              - listitem [ref=e332]:
                - text: 在 Windows 上使用
                - code [ref=e333]: schedule_job
                - text: 工具创建的任务会失败
              - listitem [ref=e334]:
                - text: 解决方案：直接使用
                - code [ref=e335]: schtasks
                - text: 创建 Windows 原生任务
            - heading "3. 备份仓库策略" [level=3] [ref=e336]
            - list [ref=e337]:
              - listitem [ref=e338]: 创建私有仓库避免敏感信息泄露
              - listitem [ref=e339]:
                - text: 使用
                - code [ref=e340]: gh auth
                - text: 登录后直接推送，无需每次输入凭据
            - heading "技术栈" [level=2] [ref=e341]
            - table [ref=e342]:
