            - text: "这个错误是在 TypeScript 编译阶段发现的，说明缺少了提交前的代码质量检查。为此建立一套完整的本地校验机制，在代码提交前就拦截这类问题 #### 步骤 1: 在编辑器中实时提示 确保 VSCode 配置了 TypeScript 检查： ``` json // .vscode/settings.json { \"typescript.validate.enable\": true, \"typescript.tsdk\": \"node_modules/typescript/lib\", \"editor.codeActionsOnSave\": { \"source.fixAll.eslint\": true } } ``` #### 步骤 2: 配置 ESLint 检查未使用变量 ``` javascript // .eslintrc.js module.exports = { extends: [ 'eslint:recommended', 'plugin:@typescript-eslint/recommended', 'plugin:prettier/recommended' ], rules: { // 将未使用变量设为错误级别（阻止构建） '@typescript-eslint/no-unused-vars': ['error', { argsIgnorePattern: '^_', // 允许 _ 开头的参数 varsIgnorePattern: '^_', // 允许 _ 开头的变量 caughtErrorsIgnorePattern: '^_' }], // 未使用的导入也报错 'no-unused-imports': 'off', '@typescript-eslint/no-unused-imports': ['error'] } } ``` #### 步骤 3: 添加 Git Hooks（最重要） 使用 husky + lint-staged 在提交前自动检查： ``` bash # 安装依赖 npm install -D husky lint-staged # 初始化 husky npx husky install # 添加 pre-commit 钩子 npx husky add .husky/pre-commit \"npx lint-staged\" ``` ``` json // package.json { \"lint-staged\": { \"*.{js,jsx,ts,tsx}\": [ \"eslint --fix\", // 自动修复可修复的问题 \"prettier --write\" ], \"*.{ts,tsx}\": [ \"tsc --noEmit\" // TypeScript 类型检查 ] } } ``` #### 步骤 4: 添加 npm scripts 本地验证 ``` json // package.json { \"scripts\": { \"lint\": \"eslint . --ext .js,.jsx,.ts,.tsx\", \"lint:fix\": \"eslint . --ext .js,.jsx,.ts,.tsx --fix\", \"type-check\": \"tsc --noEmit\", \"validate\": \"npm run lint && npm run type-check\", \"prebuild\": \"npm run validate\" // 构建前自动检查 } } ``` 3. 完整的开发工作流 配置完成后，你的开发流程应该是： ``` text 编写代码 → VSCode 实时提示错误 ↓ 保存文件 → ESLint 自动修复格式问题 ↓ git commit → pre-commit 钩子自动运行 ↓ ├─ eslint --fix ↓ ├─ prettier --write ↓ └─ tsc --noEmit ↓ 提交成功 → 推送到远程 ↓ Vercel 部署 → 应该通过所有检查 ``` 4. 针对 Vercel 的额外配置 如果想在 Vercel 上看到更详细的错误信息： ``` json // vercel.json { \"buildCommand\": \"npm run type-check && npm run build\", \"installCommand\": \"npm install\" } ``` 或者在 package.json 中： ``` json { \"scripts\": { \"vercel-build\": \"npm run type-check && npm run build\" } } ``` 5. 团队协作建议 创建 .husky/pre-commit 文件： ``` bash #!/bin/sh . \"$(dirname \"$0\")/_/husky.sh\" # 运行 lint-staged npx lint-staged # 运行类型检查（如果 lint-staged 没包含） npm run type-check ``` 这样配置后，你每次提交代码时，Git 会自动： 检查所有暂存的文件 运行 ESLint 并尝试自动修复 运行 TypeScript 类型检查 只有全部通过才能提交成功 这就能确保永远不会提交包含未使用变量的代码到仓库，Vercel 部署也不会因此失败。 ------------------------- 看起来很完美 但是实际上并非这回事哈哈哈 ![e6b382ac-849b-4269-b06f-a9441eca275c.png](data:image/png;base64,) 所以后续 ![a70a764b-e4f7-4c79-a0fb-736d919be6d7.png](data:image/png;base64,) ![04649f17-1951-48cd-a16e-39186ee51227.png](data:image/png;base64,)"
